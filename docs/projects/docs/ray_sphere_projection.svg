<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Decomposição de (o-c) paralela e perpendicular a d</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Diagrama mostrando que apenas a componente perpendicular de (o-c) a d determina a distância do raio ao centro da esfera</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  <mask id="imagine-text-gaps-bfsx16" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="420" fill="white"/><rect x="506" y="181.9581756591797" width="15.429728031158447" height="18.87519645690918" fill="black" rx="2"/><rect x="56" y="173.9581756591797" width="29.31324577331543" height="18.87519645690918" fill="black" rx="2"/><rect x="101.89160919189453" y="211.83314514160156" width="16.216774940490723" height="21.708568572998047" fill="black" rx="2"/><rect x="318" y="81.83314514160156" width="15.838992595672607" height="21.708568572998047" fill="black" rx="2"/><rect x="364" y="65.95817565917969" width="43.43287658691406" height="18.87519645690918" fill="black" rx="2"/><rect x="181" y="123.95817565917969" width="44.093997955322266" height="18.87519645690918" fill="black" rx="2"/><rect x="330" y="140.9581756591797" width="49.445919036865234" height="18.87519645690918" fill="black" rx="2"/><rect x="330" y="155.9581756591797" width="72.27029418945312" height="18.87519645690918" fill="black" rx="2"/><rect x="128.8389892578125" y="205.9581756591797" width="132.32201385498047" height="20.291881561279297" fill="black" rx="2"/><rect x="250.6941680908203" y="223.9581756591797" width="118.800537109375" height="20.291881561279297" fill="black" rx="2"/><rect x="277.8158264160156" y="237.9581756591797" width="64.36833953857422" height="18.87519645690918" fill="black" rx="2"/><rect x="280.0251770019531" y="321.12481689453125" width="119.94963073730469" height="23.125253677368164" fill="black" rx="2"/><rect x="238.8153839111328" y="347.24981689453125" width="202.36924743652344" height="20.291881561279297" fill="black" rx="2"/><rect x="246.60714721679688" y="363.24981689453125" width="186.78570556640625" height="20.291881561279297" fill="black" rx="2"/></mask></defs>

  <!-- Ray line (horizontal, d direction) -->
  <line x1="60" y1="200" x2="580" y2="200" stroke="var(--color-text-tertiary)" stroke-width="1" stroke-dasharray="4 3" mask="url(#imagine-text-gaps-bfsx16)" style="fill:rgb(0, 0, 0);stroke:rgb(156, 154, 146);color:rgb(251, 251, 254);stroke-width:1px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Arrow on ray -->
  <line x1="400" y1="200" x2="500" y2="200" stroke="var(--color-text-secondary)" stroke-width="2" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(194, 192, 182);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="510" y="196" fill="var(--color-text-secondary)" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">d</text>
  <text x="60" y="188" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">raio</text>

  <!-- Origin o -->
  <circle cx="120" cy="200" r="5" fill="#185FA5" style="fill:rgb(24, 95, 165);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="110" y="228" text-anchor="middle" fill="#185FA5" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">o</text>

  <!-- Sphere center c -->
  <circle cx="310" cy="100" r="5" fill="#993556" style="fill:rgb(153, 53, 86);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="322" y="98" fill="#993556" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:start;dominant-baseline:auto">c</text>

  <!-- Sphere circle -->
  <circle cx="310" cy="100" r="54" fill="none" stroke="#993556" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.5" style="fill:none;stroke:rgb(153, 53, 86);color:rgb(251, 251, 254);stroke-width:1.2px;stroke-dasharray:5px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="368" y="80" fill="#993556" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">esfera</text>

  <!-- Vector (o - c) from c to o -->
  <line x1="310" y1="100" x2="120" y2="200" stroke="#185FA5" stroke-width="1.8" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(24, 95, 165);color:rgb(251, 251, 254);stroke-width:1.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="185" y="138" fill="#185FA5" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">(o − c)</text>

  <!-- Foot of perpendicular from c to ray: project c onto ray (y=200), foot at (310, 200) -->
  <!-- d⊥ component: from o to foot = (310-120, 0) → labeled as (o-c)∥ actually it is the parallel part from c to foot -->
  <!-- Let's be precise:
       Let f = foot of perp from c onto the ray.
       c = (310, 100), ray at y=200, so f = (310, 200).
       (o-c) = o - c = (120-310, 200-100) = (-190, 100)
       parallel component (along d=(1,0)): proj = (-190, 0), drawn from c=(310,100) to c+(-190,0)=(120,100)
       perpendicular component (perp to d): perp = (0, 100), drawn from foot=(310,200) to c=(310,100)
  -->

  <!-- Parallel component: from c downward projected foot then along ray -->
  <!-- Draw: dashed line from c=(310,100) down to foot=(310,200) — this is the ⊥ component -->
  <!-- Draw: from foot=(310,200) back to o=(120,200) — this is the ∥ component along d -->

  <!-- Perpendicular line from c to ray (right angle marker) -->
  <line x1="310" y1="100" x2="310" y2="200" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(216, 90, 48);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Right angle box -->
  <rect x="298" y="188" width="12" height="12" fill="none" stroke="#D85A30" stroke-width="1" style="fill:none;stroke:rgb(216, 90, 48);color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Label for perp component -->
  <text x="334" y="155" fill="#D85A30" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">(o−c)⊥</text>
  <text x="334" y="170" fill="#D85A30" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">= distância!</text>

  <!-- Parallel component: from o=(120,200) to foot=(310,200) -->
  <line x1="120" y1="200" x2="302" y2="200" stroke="#3B6D11" stroke-width="2" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(59, 109, 17);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="195" y="220" text-anchor="middle" fill="#3B6D11" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">(o−c)∥  — não importa!</text>

  <!-- Foot label -->
  <circle cx="310" cy="200" r="4" fill="#D85A30" style="fill:rgb(216, 90, 48);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="310" y="238" text-anchor="middle" fill="var(--color-text-secondary)" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">ponto mais próximo</text>
  <text x="310" y="252" text-anchor="middle" fill="var(--color-text-secondary)" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">do raio a c</text>

  <!-- Discriminant box -->
  <rect x="60" y="310" width="560" height="80" rx="8" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.5" style="fill:none;stroke:rgba(222, 220, 209, 0.3);color:rgb(251, 251, 254);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="340" y="338" text-anchor="middle" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Δ = r² − |(o−c)⊥|²</text>
  <text x="340" y="362" text-anchor="middle" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Δ ≥ 0  →  raio passa dentro da esfera</text>
  <text x="340" y="378" text-anchor="middle" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Δ &lt; 0  →  raio passa fora da esfera</text>
</svg>